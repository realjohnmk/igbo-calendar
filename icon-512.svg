<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1208"/>
      <stop offset="100%" style="stop-color:#2C1D0A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5C842"/>
      <stop offset="100%" style="stop-color:#E8A830"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle top accent line -->
  <rect x="96" y="0" width="320" height="7" rx="4" fill="url(#gold)" opacity="0.6"/>

  <!-- IGBO — large bold -->
  <text x="256" y="262"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="178"
    font-weight="bold"
    letter-spacing="16"
    fill="url(#gold)">IGBO</text>

  <!-- Thin divider line -->
  <rect x="106" y="286" width="300" height="4" rx="2" fill="#E8A830" opacity="0.35"/>

  <!-- CALENDAR — light tracking -->
  <text x="256" y="352"
    text-anchor="middle"
    font-family="'Gill Sans', Optima, 'Trebuchet MS', sans-serif"
    font-size="48"
    font-weight="300"
    letter-spacing="18"
    fill="#F5EDD8"
    opacity="0.85">CALENDAR</text>
</svg>
