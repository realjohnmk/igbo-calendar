<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1208"/>
      <stop offset="100%" style="stop-color:#2C1D0A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5C842"/>
      <stop offset="100%" style="stop-color:#E8A830"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>

  <!-- Subtle top accent line -->
  <rect x="36" y="0" width="120" height="3" rx="2" fill="url(#gold)" opacity="0.6"/>

  <!-- IGBO — large bold -->
  <text x="96" y="98"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="bold"
    letter-spacing="6"
    fill="url(#gold)">IGBO</text>

  <!-- Thin divider line -->
  <rect x="40" y="108" width="112" height="1.5" rx="1" fill="#E8A830" opacity="0.35"/>

  <!-- CALENDAR — light tracking -->
  <text x="96" y="138"
    text-anchor="middle"
    font-family="'Gill Sans', Optima, 'Trebuchet MS', sans-serif"
    font-size="18"
    font-weight="300"
    letter-spacing="7"
    fill="#F5EDD8"
    opacity="0.85">CALENDAR</text>
</svg>
